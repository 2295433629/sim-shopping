server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: SimShopping
  profiles:
    active: local
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.sim.shopping.infrastructure.persistence.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 7200000
    refresh-token-expiration: 604800000
  upload:
    url-prefix: /uploads
  mock:
    payment:
      delay-min: 1000
      delay-max: 3000
    logistics:
      interval: 3600

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: SimShopping
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shopping_dream?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.sim.shopping.infrastructure.persistence.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  jwt:
    secret: ShoppingDreamSecretKey2026ForJwtTokenGenerationMustBeLongEnough
    access-token-expiration: 86400000
    refresh-token-expiration: 604800000
  upload:
    path: D:/workspace/shopping/sim-shopping/uploads
    url-prefix: /uploads
  cache:
#    database/redis
    type: database
  mock:
    payment:
      delay-min: 1000
      delay-max: 3000
    logistics:
      interval: 3600

logging:
  level:
    com.sim.shopping: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

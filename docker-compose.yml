version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shopping-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sim_shopping
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - shopping-net

  redis:
    image: redis:7-alpine
    container_name: shopping-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - shopping-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopping-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/sim_shopping?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    volumes:
      - ./uploads:/app/uploads
    networks:
      - shopping-net

  user-web:
    build:
      context: ./frontend/user-web
      dockerfile: Dockerfile
    container_name: shopping-user-web
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - shopping-net

  merchant-web:
    build:
      context: ./frontend/merchant-web
      dockerfile: Dockerfile
    container_name: shopping-merchant-web
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - shopping-net

  admin-web:
    build:
      context: ./frontend/admin-web
      dockerfile: Dockerfile
    container_name: shopping-admin-web
    ports:
      - "5175:80"
    depends_on:
      - backend
    networks:
      - shopping-net

  nginx:
    image: nginx:alpine
    container_name: shopping-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - user-web
      - merchant-web
      - admin-web
    networks:
      - shopping-net

volumes:
  mysql_data:
  redis_data:

networks:
  shopping-net:
    driver: bridge

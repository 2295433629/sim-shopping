version: '3.8'

# 精简版：使用宿主机本地 MySQL + Redis，Docker 只跑后端和前端
# 适用场景：节省内存，MySQL 已在宿主机本地安装
#
# 前置要求：
#   1. 宿主机已安装 MySQL 并创建数据库 sim_shopping
#   2. MySQL 允许远程连接（bind-address = 0.0.0.0 或至少允许 Docker 网段）
#   3. 已执行 sql/init.sql 和 sql/init_products.sql 建表和初始化数据
#
# 使用方式：
#   docker-compose -f docker-compose.local-db.yml up -d --build

services:
  redis:
    image: redis:7-alpine
    container_name: shopping-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - shopping-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopping-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # 连接宿主机本地 MySQL（Docker 26+ Linux 支持 host.docker.internal）
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      # Redis 用 Docker 容器
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-ShoppingDreamDockerSecretKey2026ForJwtTokenGeneration}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - shopping-net

  user-web:
    build:
      context: ./frontend/user-web
      dockerfile: Dockerfile
    container_name: shopping-user-web
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shopping-net

  nginx:
    image: nginx:alpine
    container_name: shopping-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.minimal.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend
      - user-web
    restart: unless-stopped
    networks:
      - shopping-net

volumes:
  redis_data:

networks:
  shopping-net:
    driver: bridge
